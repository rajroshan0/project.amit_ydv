<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f4f8;
      font-family: Arial, sans-serif;
    }
    .card {
      background: white;
      padding: 36px 32px;
      border-radius: 10px;
      width: 340px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #333;
    }
    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #4a90e2; }
    button {
      width: 100%;
      padding: 11px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    .register-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #555;
    }
    .register-link a { color: #4a90e2; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <h2>Sign In</h2>
  <form action="/login" method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="Enter your username" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>

    <button type="submit">Sign In</button>
  </form>
  <div class="register-link">Don't have an account? <a href="/registration">Register</a></div>
</div>
</body>
</html>
