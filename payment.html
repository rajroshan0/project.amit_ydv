<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - UrbanStyle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #111;
      color: white;
      padding: 14px 28px;
      font-size: 22px;
      font-weight: bold;
    }
    header a { color: white; text-decoration: none; }
    .page {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 36px 32px;
    }
    h2 {
      font-size: 22px;
      margin-bottom: 24px;
      color: #111;
      border-bottom: 2px solid #ff4d4d;
      padding-bottom: 10px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus, select:focus { border-color: #ff4d4d; }
    .row { display: flex; gap: 14px; }
    .row > div { flex: 1; }
    .divider {
      font-size: 13px;
      color: #888;
      margin: 8px 0 18px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .total-box {
      background: #f8f8f8;
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .total-box p { font-size: 14px; color: #555; margin-bottom: 6px; }
    .total-box .amount { font-size: 20px; font-weight: bold; color: #ff4d4d; }
    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #ff4d4d;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #cc3333; }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }
    .back-link:hover { color: #333; }
    .success-msg {
      display: none;
      text-align: center;
      padding: 30px 0;
    }
    .success-msg i { font-size: 56px; color: #4caf50; }
    .success-msg h3 { margin-top: 16px; font-size: 22px; }
    .success-msg p { color: #666; margin-top: 8px; }
    .success-msg a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 24px;
      background: #111;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<header><a href="/">&#8592; UrbanStyle</a></header>
<div class="page">
  <div class="card">
    <div id="payment-form-section">
      <h2><i class="fa-solid fa-lock" style="font-size:16px;margin-right:6px;"></i> Secure Payment</h2>

      <div class="total-box">
        <p>Order Total</p>
        <div class="amount" id="display-total">RS 0</div>
      </div>

      <form id="payment-form" onsubmit="submitPayment(event)">
        <div class="divider">Delivery Details</div>

        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Delivery Address</label>
        <input type="text" placeholder="Street, City, State" required>

        <div class="divider">Card Details</div>

        <label>Card Number</label>
        <input type="text" id="card-num" placeholder="1234 5678 9012 3456" maxlength="19" required oninput="formatCard(this)">

        <div class="row">
          <div>
            <label>Expiry Date</label>
            <input type="text" placeholder="MM / YY" maxlength="7" required oninput="formatExpiry(this)">
          </div>
          <div>
            <label>CVV</label>
            <input type="password" placeholder="123" maxlength="3" required>
          </div>
        </div>

        <label>Payment Method</label>
        <select required>
          <option value="">Select method</option>
          <option>Credit Card</option>
          <option>Debit Card</option>
          <option>UPI</option>
          <option>Net Banking</option>
        </select>

        <button type="submit">Pay Now</button>
      </form>
      <a class="back-link" href="/">&#8592; Back to Shop</a>
    </div>

    <div class="success-msg" id="success-msg">
      <i class="fa-solid fa-circle-check"></i>
      <h3>Payment Successful!</h3>
      <p>Thank you for your order. It will be delivered soon.</p>
      <a href="/">Continue Shopping</a>
    </div>
  </div>
</div>
<script>
  var cart = JSON.parse(localStorage.getItem('cart') || '[]');
  var total = cart.reduce(function(sum, item) { return sum + item.price; }, 0);
  document.getElementById('display-total').textContent = 'RS ' + (total || 0);

  function formatCard(input) {
    var v = input.value.replace(/\D/g, '').substring(0, 16);
    input.value = v.replace(/(.{4})/g, '$1 ').trim();
  }

  function formatExpiry(input) {
    var v = input.value.replace(/\D/g, '').substring(0, 4);
    if (v.length >= 3) v = v.substring(0,2) + ' / ' + v.substring(2);
    input.value = v;
  }

  function submitPayment(e) {
    e.preventDefault();
    localStorage.removeItem('cart');
    document.getElementById('payment-form-section').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';
  }
</script>
</body>
</html>
